<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pétanque – Seriespelshanterare</title>
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e2a;
    --border: #252a38;
    --accent: #6366f1;
    --accent2: #818cf8;
    --gold: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } 
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 0.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; padding: 2rem; overflow-x: hidden; }

  /* SIDEBAR */
  .sidebar-logo { font-size: 1.1rem; font-weight: 900; color: var(--accent2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .sidebar-logo span { color: var(--gold); }
  .nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.75rem; border-radius: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-section { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 1rem 0 0.3rem 0.75rem; }
  .sidebar-footer { margin-top: auto; }

  /* MODE TOGGLE */
  .mode-toggle { display: flex; background: var(--bg3); border-radius: 0.5rem; padding: 3px; border: 1px solid var(--border); }
  .mode-btn { flex: 1; padding: 0.4rem; border-radius: 0.35rem; font-size: 0.75rem; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; background: none; color: var(--muted); }
  .mode-btn.active { background: var(--accent); color: #fff; }

  /* HEADER */
  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 1.8rem; font-weight: 900; color: var(--text); }
  .page-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; box-shadow: var(--card-shadow); }
  .card-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-title svg { color: var(--accent2); }

  /* SETUP GRID */
  .setup-grid { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; }
  @media(max-width:900px) { .setup-grid { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* INPUTS */
  .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  input[type="text"], input[type="number"], select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 0.5rem; padding: 0.55rem 0.75rem; font-size: 0.9rem; outline: none; transition: border 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
  input[type="text"] { flex: 1; }
  select { flex: 1; }
  input[type="number"] { width: 64px; text-align: center; }

  /* BUTTONS */
  .btn { padding: 0.55rem 1.1rem; border-radius: 0.5rem; font-weight: 700; font-size: 0.85rem; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .btn-success:hover { background: rgba(34,197,94,0.25); }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-ghost { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-xl { padding: 1rem 2rem; font-size: 1rem; border-radius: 0.75rem; width: 100%; margin-top: 1.5rem; letter-spacing: 0.05em; }

  /* DIVISION PILL */
  .div-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg3); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; margin-bottom: 0.4rem; }
  .div-item span { font-weight: 600; font-size: 0.9rem; }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0 0.2rem; transition: color 0.15s; }
  .remove-btn:hover { color: var(--red); }

  /* PREVIEW CARDS */
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
  .preview-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 0.6rem; padding: 1rem; }
  .preview-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .preview-card-header span { font-weight: 700; color: var(--accent2); font-size: 0.9rem; }
  .team-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 0.35rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; margin: 0.15rem; }
  .meetings-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; font-size: 0.75rem; color: var(--muted); padding-top: 0.5rem; border-top: 1px solid var(--border); }

  /* ACTIVE SECTION */
  .division-block { margin-bottom: 3rem; scroll-margin-top: 2rem; }
  .division-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .division-header h2 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
  .division-header .line { flex: 1; height: 1px; background: var(--border); }
  .active-grid { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; }
  @media(max-width:1100px) { .active-grid { grid-template-columns: 1fr; } }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { background: var(--bg3); color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.6rem 0.75rem; text-align: center; border-bottom: 1px solid var(--border); }
  thead th:first-child, thead th:nth-child(2) { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 0.65rem 0.75rem; text-align: center; }
  td:first-child { text-align: left; color: var(--muted); font-weight: 700; font-size: 0.75rem; width: 32px; }
  td:nth-child(2) { text-align: left; font-weight: 600; }
  .pts-cell { font-weight: 800; color: var(--accent2); background: rgba(99,102,241,0.08); }
  .gold-row td:nth-child(2)::before { content: '👑 '; }
  .diff-pos { color: var(--green); }
  .diff-neg { color: var(--red); }

  /* ROUNDS */
  .rounds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .round-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden; transition: border-color 0.2s; }
  .round-card.done { border-color: rgba(34,197,94,0.3); }
  .round-header { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; }
  .round-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .done-badge { font-size: 0.65rem; font-weight: 700; color: var(--green); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); padding: 0.1rem 0.5rem; border-radius: 9999px; }
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }
  .round-body { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; }
  .match-row { display: flex; align-items: center; gap: 0.4rem; }
  .team-name { flex: 1; font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-name.right { text-align: right; }
  .score-area { display: flex; align-items: center; gap: 0.3rem; min-width: 88px; justify-content: center; }
  .score-input { width: 36px; height: 32px; text-align: center; padding: 0; font-weight: 700; font-size: 0.9rem; border-radius: 0.4rem; }
  .score-sep { color: var(--border); font-weight: 700; }
  .score-display { display: flex; align-items: center; gap: 0.4rem; font-weight: 900; font-size: 1rem; }
  .score-display .s { min-width: 24px; text-align: center; }
  .score-display .home-win { color: var(--green); }
  .score-display .away-win { color: var(--red); }
  .score-display .sep { color: var(--border); font-size: 0.75rem; }
  .no-result { color: var(--muted); font-size: 0.8rem; }

  /* BOTTOM BAR */
  .bottom-bar { position: fixed; bottom: 0; left: 220px; right: 0; background: rgba(13,15,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 1rem; justify-content: flex-end; z-index: 100; }
  @media(max-width:900px) { .bottom-bar { left: 0; } }

  /* UTIL */
  .hidden { display: none !important; }
  .badge { font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 9999px; }
  .badge-blue { background: rgba(99,102,241,0.15); color: var(--accent2); border: 1px solid rgba(99,102,241,0.2); }
  .badge-gold { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

  @media print {
    .sidebar, .bottom-bar, .no-print { display: none !important; }
    body { background: white; color: black; }
    .card, .round-card { box-shadow: none; border: 1px solid #ddd; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">Pétanque <span>Pro</span></div>
    <div id="nav-setup" class="nav-item active" onclick="showSetup()">
      <div class="nav-dot"></div> Inställningar
    </div>
    <div id="nav-divisions-header" class="nav-section hidden">Divisioner</div>
    <div id="nav-divisions"></div>
    <div class="sidebar-footer">
      <div class="nav-section">Vy</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mb-admin" onclick="setMode('admin')">Admin</button>
        <button class="mode-btn" id="mb-public" onclick="setMode('public')">Publik</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- SETUP -->
    <div id="setup-section">
      <div class="page-header">
        <h1>Sätt upp seriespel</h1>
        <p>Skapa divisioner, lägg till lag och starta säsongen.</p>
      </div>
      <div class="setup-grid">

        <!-- Divisioner -->
        <div class="card">
          <div class="card-title">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
            Divisioner
          </div>
          <div class="input-row">
            <input type="text" id="div-input" placeholder="t.ex. Division 1" onkeydown="if(event.key==='Enter')addDivision()">
            <button class="btn btn-primary" onclick="addDivision()">Skapa</button>
          </div>
          <div id="div-list"></div>
        </div>

        <!-- Lag -->
        <div class="card">
          <div class="card-title">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Lägg till lag
          </div>
          <div class="input-row">
            <input type="text" id="team-input" placeholder="Lagnamn" onkeydown="if(event.key==='Enter')addTeam()">
            <select id="div-select"><option value="">Välj division…</option></select>
            <button class="btn btn-success" onclick="addTeam()">Lägg till</button>
          </div>
          <div class="preview-grid" id="division-preview-container"></div>
          <div id="start-all-container" class="hidden">
            <button class="btn btn-primary btn-xl" onclick="generateAllLeagues()">⚽ STARTA ALLA SERIESPEL</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ACTIVE LEAGUES -->
    <div id="active-leagues-section" class="hidden">
      <div class="page-header no-print" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1>Seriespelet</h1>
          <p>Mata in resultat i adminläge. Publikläge visar enbart tabeller och utfall.</p>
        </div>
      </div>
      <div id="active-leagues-content"></div>
    </div>

  </main>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar" class="bottom-bar hidden">
  <button class="btn btn-ghost" onclick="window.print()">🖨 Skriv ut</button>
  <button class="btn btn-danger" onclick="resetAll()">Nollställ allt</button>
</div>

<script>
let divisions = [];
let viewMode = 'admin';

// ─── NAVIGATION ───────────────────────────────────────────
function showSetup() {
  document.getElementById('setup-section').classList.remove('hidden');
  document.getElementById('active-leagues-section').classList.add('hidden');
  setNavActive('nav-setup');
}
function showDivision(id) {
  document.getElementById('setup-section').classList.add('hidden');
  document.getElementById('active-leagues-section').classList.remove('hidden');
  setNavActive('nav-div-' + id);
  setTimeout(() => {
    const el = document.getElementById('div-block-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}
function setNavActive(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}
function setMode(m) {
  viewMode = m;
  document.getElementById('mb-admin').classList.toggle('active', m === 'admin');
  document.getElementById('mb-public').classList.toggle('active', m === 'public');
  if (!document.getElementById('active-leagues-section').classList.contains('hidden'))
    renderActiveLeagues();
}

// ─── SETUP ────────────────────────────────────────────────
function addDivision() {
  const inp = document.getElementById('div-input');
  const name = inp.value.trim();
  if (!name) return;
  divisions.push({ id: Date.now(), name, meetings: 1, teams: [], rounds: [] });
  inp.value = '';
  updateSetupUI();
}
function removeDivision(id) {
  divisions = divisions.filter(d => d.id !== id);
  updateSetupUI();
}
function addTeam() {
  const tInp = document.getElementById('team-input');
  const dSel = document.getElementById('div-select');
  const name = tInp.value.trim();
  const divId = parseInt(dSel.value);
  if (!name || !divId) return;
  const div = divisions.find(d => d.id === divId);
  if (div && !div.teams.includes(name)) { div.teams.push(name); tInp.value = ''; }
  updateSetupUI();
}
function removeTeam(divId, team) {
  const div = divisions.find(d => d.id === divId);
  if (div) { div.teams = div.teams.filter(t => t !== team); updateSetupUI(); }
}
function updateMeetings(divId, val) {
  const div = divisions.find(d => d.id === divId);
  if (div) div.meetings = Math.max(1, parseInt(val) || 1);
}

function updateSetupUI() {
  // div list
  document.getElementById('div-list').innerHTML = divisions.map(d => `
    <div class="div-item">
      <span>${d.name}</span>
      <button class="remove-btn" onclick="removeDivision(${d.id})">×</button>
    </div>`).join('');

  // select
  const sel = document.getElementById('div-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Välj division…</option>' +
    divisions.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
  sel.value = cur;

  // preview
  document.getElementById('division-preview-container').innerHTML = divisions.map(d => `
    <div class="preview-card">
      <div class="preview-card-header">
        <span>${d.name}</span>
        <span class="badge badge-blue">${d.teams.length} lag</span>
      </div>
      <div>${d.teams.map(t => `
        <span class="team-badge">${t}
          <button class="remove-btn" style="font-size:0.8rem" onclick="removeTeam(${d.id},'${t.replace(/'/g,"\\'")}')">×</button>
        </span>`).join('')}
      </div>
      <div class="meetings-row">
        <span>Antal möten:</span>
        <input type="number" value="${d.meetings}" min="1" max="10" style="width:48px"
          onchange="updateMeetings(${d.id},this.value)">
      </div>
    </div>`).join('');

  const canStart = divisions.some(d => d.teams.length >= 2);
  document.getElementById('start-all-container').classList.toggle('hidden', !canStart);
}

// ─── GENERATE ─────────────────────────────────────────────
function generateAllLeagues() {
  divisions.forEach(div => {
    if (div.teams.length < 2) return;
    const temps = [...div.teams];
    if (temps.length % 2 !== 0) temps.push(null);
    const n = temps.length;
    let base = [];
    for (let r = 0; r < n - 1; r++) {
      let matches = [];
      for (let i = 0; i < n / 2; i++) {
        const h = temps[i], a = temps[n - 1 - i];
        if (h && a) matches.push({ home: h, away: a, homeScore: null, awayScore: null });
      }
      base.push(matches);
      temps.splice(1, 0, temps.pop());
    }
    div.rounds = [];
    for (let m = 0; m < div.meetings; m++) {
      base.forEach(round => {
        div.rounds.push(round.map(match => ({
          home: m % 2 === 0 ? match.home : match.away,
          away: m % 2 === 0 ? match.away : match.home,
          homeScore: null, awayScore: null
        })));
      });
    }
  });

  document.getElementById('setup-section').classList.add('hidden');
  document.getElementById('active-leagues-section').classList.remove('hidden');
  document.getElementById('bottom-bar').classList.remove('hidden');
  document.getElementById('nav-divisions-header').classList.remove('hidden');

  // Build sidebar nav
  document.getElementById('nav-divisions').innerHTML = divisions.map(d => `
    <div class="nav-item" id="nav-div-${d.id}" onclick="showDivision(${d.id})">
      <div class="nav-dot"></div> ${d.name}
    </div>`).join('');

  setNavActive('nav-div-' + divisions[0]?.id);
  renderActiveLeagues();
}

// ─── RENDER ───────────────────────────────────────────────
function renderActiveLeagues() {
  const cont = document.getElementById('active-leagues-content');
  cont.innerHTML = '';
  divisions.forEach(div => {
    if (!div.rounds.length) return;
    const block = document.createElement('div');
    block.className = 'division-block';
    block.id = 'div-block-' + div.id;
    block.innerHTML = `
      <div class="division-header">
        <h2>${div.name}</h2>
        <div class="line"></div>
        ${viewMode === 'public' ? '<span class="badge badge-gold">PUBLIKVY</span>' : ''}
      </div>
      <div class="active-grid">
        <div>
          <div class="card" style="padding:0;overflow:hidden">
            <table>
              <thead><tr>
                <th>#</th><th>Lag</th><th title="Spelade">S</th><th title="Vinster">V</th>
                <th title="Förluster">F</th>                <th title="Klotdifferens">KD</th><th title="Poäng">P</th>
              </tr></thead>
              <tbody id="tb-${div.id}"></tbody>
            </table>
          </div>
        </div>
        <div class="rounds-grid" id="rg-${div.id}"></div>
      </div>`;
    cont.appendChild(block);
    renderTable(div.id);
    renderRounds(div.id);
  });
}

function renderTable(divId) {
  const div = divisions.find(d => d.id === divId);
  const stats = {};
  div.teams.forEach(t => stats[t] = { played: 0, wins: 0, losses: 0, gf: 0, ga: 0, pts: 0 });

  div.rounds.forEach(round => round.forEach(m => {
    if (m.homeScore === null || m.awayScore === null) return;
    const hs = m.homeScore, as_ = m.awayScore;
    stats[m.home].played++; stats[m.away].played++;
    stats[m.home].gf += hs; stats[m.home].ga += as_;
    stats[m.away].gf += as_; stats[m.away].ga += hs;
    // No draw in pétanque — must have a winner
    if (hs > as_) { stats[m.home].wins++; stats[m.home].pts += 2; stats[m.away].losses++; }
    else if (as_ > hs) { stats[m.away].wins++; stats[m.away].pts += 2; stats[m.home].losses++; }
    // If scores are equal we do NOT award points (shouldn't happen in pétanque, but safe fallback)
  }));

  const sorted = Object.entries(stats).map(([name, s]) => ({ name, ...s, diff: s.gf - s.ga }))
    .sort((a, b) => b.pts - a.pts || b.diff - a.diff || b.gf - a.gf);

  const tbody = document.getElementById('tb-' + divId);
  if (!tbody) return;
  tbody.innerHTML = sorted.map((t, i) => `
    <tr class="${i === 0 && t.pts > 0 ? 'gold-row' : ''}">
      <td>${i + 1}</td>
      <td>${t.name}</td>
      <td>${t.played}</td>
      <td style="color:var(--green)">${t.wins}</td>
      <td style="color:var(--red)">${t.losses}</td>
      <td class="${t.diff > 0 ? 'diff-pos' : t.diff < 0 ? 'diff-neg' : ''}">${t.diff > 0 ? '+' : ''}${t.diff}</td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`).join('');
}

function renderRounds(divId) {
  const div = divisions.find(d => d.id === divId);
  const grid = document.getElementById('rg-' + divId);
  if (!grid) return;

  grid.innerHTML = div.rounds.map((round, rIdx) => {
    const total = round.length;
    const done = round.filter(m => m.homeScore !== null && m.awayScore !== null).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    const allDone = done === total;

    const matchesHTML = round.map((m, mIdx) => {
      const hasResult = m.homeScore !== null && m.awayScore !== null;

      let scoreHTML;
      if (viewMode === 'admin') {
        scoreHTML = `
          <div class="score-area">
            <input type="number" class="score-input" min="0"
              value="${m.homeScore !== null ? m.homeScore : ''}"
              placeholder="-"
              onchange="setScore(${divId},${rIdx},${mIdx},'home',this.value)">
            <span class="score-sep">–</span>
            <input type="number" class="score-input" min="0"
              value="${m.awayScore !== null ? m.awayScore : ''}"
              placeholder="-"
              onchange="setScore(${divId},${rIdx},${mIdx},'away',this.value)">
          </div>`;
      } else {
        if (hasResult) {
          const hWin = m.homeScore > m.awayScore;
          scoreHTML = `
            <div class="score-area">
              <div class="score-display">
                <span class="s ${hWin ? 'home-win' : ''}">${m.homeScore}</span>
                <span class="sep">–</span>
                <span class="s ${!hWin ? 'away-win' : ''}">${m.awayScore}</span>
              </div>
            </div>`;
        } else {
          scoreHTML = `<div class="score-area"><span class="no-result">vs</span></div>`;
        }
      }

      return `
        <div class="match-row">
          <span class="team-name right">${m.home}</span>
          ${scoreHTML}
          <span class="team-name">${m.away}</span>
        </div>`;
    }).join('');

    return `
      <div class="round-card ${allDone ? 'done' : ''}">
        <div class="round-header">
          <span class="round-label">Omgång ${rIdx + 1}</span>
          ${allDone ? '<span class="done-badge">✓ Klar</span>' : `<span style="font-size:0.7rem;color:var(--muted)">${done}/${total}</span>`}
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="round-body">${matchesHTML}</div>
      </div>`;
  }).join('');
}

function setScore(divId, rIdx, mIdx, side, val) {
  const div = divisions.find(d => d.id === divId);
  const score = val === '' ? null : parseInt(val);
  if (side === 'home') div.rounds[rIdx][mIdx].homeScore = score;
  else div.rounds[rIdx][mIdx].awayScore = score;
  renderTable(divId);
  renderRounds(divId);
}

function resetAll() {
  if (!confirm('Nollställ allt? Alla divisioner, lag och resultat tas bort.')) return;
  divisions = [];
  viewMode = 'admin';
  document.getElementById('mb-admin').classList.add('active');
  document.getElementById('mb-public').classList.remove('active');
  document.getElementById('setup-section').classList.remove('hidden');
  document.getElementById('active-leagues-section').classList.add('hidden');
  document.getElementById('bottom-bar').classList.add('hidden');
  document.getElementById('nav-divisions-header').classList.add('hidden');
  document.getElementById('nav-divisions').innerHTML = '';
  setNavActive('nav-setup');
  updateSetupUI();
}
</script>
</body>
</html>
